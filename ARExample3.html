<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"

<body style='margin : 0px; overflow: hidden;'>
    <a-scene embedded arjs>
        <!-- <a-assets>
            <video src="assets/DiscoverTCSUruguay.mp4"></video>
        </a-assets> -->
        <!-- create your content here. just a box for now -->

        <!-- <a-image src="img/TCS_Logo_CSR-1.jpg"></a-image> -->
        <!-- define a camera which will move according to the marker position -->
        <a-video id="vid" src="assets/DiscoverTCSUruguay.mp4" position="0 0.2 0" rotation="90 180 0">
        </a-video>

        <a-marker-camera preset='hiro'>
            <!-- <a-plane position='0 0 0' rotation='90 180 0'></a-plane> -->
            <a-box id="box" position='0 0.5 0' material='opacity: 0.8;'></a-box>
        </a-marker-camera>

        <button id="btn1"
            style="position: absolute; top: 10%; left: 50%; height: 50px; width: 100px; z-index: 999999;">TEST</button>
    </a-scene>

            if (check == 'true') {
